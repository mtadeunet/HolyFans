name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Set permissions for the deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Create .env.local
      run: |
        echo "NODE_ENV=production" > .env.local
        echo "NEXT_PUBLIC_BASE_URL=https://www.holyfans.pt" >> .env.local
        
    - name: Build project
      run: npm run build
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Build static files
      run: |
        mkdir -p out
        # Copy static assets
        cp -r .next/static out/
        cp -r public out/
        # Copy built pages
        cp -r .next/server/app out/
        # Create index.html for GitHub Pages root (only needed for GitHub Pages)
        echo '<!DOCTYPE html>
        <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>HolyFans</title>
            <meta http-equiv="refresh" content="0;url=/en">
          </head>
          <body>
            <p>Redirecting to <a href="/en">HolyFans</a>...</p>
          </body>
        </html>' > out/index.html
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: out
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
